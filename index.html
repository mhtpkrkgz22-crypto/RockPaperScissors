<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>LET'S PLAY ROCK, PAPER and SCISSORS!</h1>
    <div id="contant">
      <div id="stars-left" class="left">
        <img src="icons/empty-star.png" alt="staricon1" />
        <img src="icons/empty-star.png" alt="staricon2" />
        <img src="icons/empty-star.png" alt="staricon3" />
        <img src="icons/empty-star.png" alt="staricon4" />
        <img src="icons/empty-star.png" alt="staricon5" />
      </div>
      <div id="container">
        <p id="message" class=""></p>
        <div id="images">
          <button id="rock-icon" class="icon">
            <img src="icons/rock-icon.png" alt="Rock" />
          </button>
          <button id="paper-icon" class="icon">
            <img src="icons/paper-icon.png" alt="Paper" />
          </button>
          <button id="scissors-icon" class="icon">
            <img src="icons/scissors-icon.png" alt="Scissors" />
          </button>
        </div>
        <div id="buttons">
          <button id="play-btn">PLAY</button>
          <button id="reset-btn">RESET</button>
        </div>
      </div>
      <div id="stars-right" class="right">
        <img src="icons/empty-star.png" alt="staricon1" />
        <img src="icons/empty-star.png" alt="staricon2" />
        <img src="icons/empty-star.png" alt="staricon3" />
        <img src="icons/empty-star.png" alt="staricon4" />
        <img src="icons/empty-star.png" alt="staricon5" />
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
