<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main-container">
      <div class="overlay"></div>
      <div class="main-content">
        <h1 class="title">LET'S PLAY ROCK, PAPER and SCISSORS!</h1>
        <button class="start-btn">START GAME</button>
        <div class="content">
          <div class="stars-left">
            <img src="icons/empty-star.png" alt="staricon1" />
            <img src="icons/empty-star.png" alt="staricon2" />
            <img src="icons/empty-star.png" alt="staricon3" />
            <img src="icons/empty-star.png" alt="staricon4" />
            <img src="icons/empty-star.png" alt="staricon5" />
          </div>
          <div class="container">
            <p class="message"></p>
            <div class="images">
              <button id="rock-icon" class="icon">
                <img src="icons/rock-icon.png" alt="Rock" />
              </button>
              <button id="paper-icon" class="icon">
                <img src="icons/paper-icon.png" alt="Paper" />
              </button>
              <button id="scissors-icon" class="icon">
                <img src="icons/scissors-icon.png" alt="Scissors" />
              </button>
            </div>
            <div class="button">
              <button id="play-btn" class="btn">PLAY</button>
              <button id="reset-btn" class="btn">RESET</button>
            </div>
          </div>
          <div class="stars-right">
            <img src="icons/empty-star.png" alt="staricon6" />
            <img src="icons/empty-star.png" alt="staricon7" />
            <img src="icons/empty-star.png" alt="staricon8" />
            <img src="icons/empty-star.png" alt="staricon9" />
            <img src="icons/empty-star.png" alt="staricon10" />
          </div>
        </div>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
